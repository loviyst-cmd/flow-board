<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Board — 极简看板</title>
<style>
:root{
  --bg-gradient:linear-gradient(135deg,#eef4fb 0%,#dde9f5 50%,#e4ecf5 100%);
  --sidebar-bg:#ffffff;
  --sidebar-hover:#eff4fa;
  --sidebar-active:linear-gradient(135deg,#dbeafe,#bfdbfe);
  --list-bg:#ffffff;
  --list-bg-hover:#f8fafc;
  --list-border:#e2e8f0;
  --card-bg:#ffffff;
  --card-shadow:0 1px 2px rgba(30,58,95,0.06),0 1px 3px rgba(30,58,95,0.04);
  --card-shadow-drag:0 16px 40px rgba(30,58,95,0.18),0 4px 12px rgba(30,58,95,0.1);
  --card-shadow-hover:0 4px 12px rgba(30,58,95,0.1),0 2px 4px rgba(30,58,95,0.06);
  --text-1:#1e293b;
  --text-2:#475569;
  --text-3:#94a3b8;
  --accent:#3b82f6;
  --accent-hover:#2563eb;
  --accent-light:#dbeafe;
  --danger:#ef4444;
  --danger-light:#fee2e2;
  --success:#10b981;
  --warning:#f59e0b;
  --archive:#6366f1;
  --archive-light:#e0e7ff;
  --radius:10px;
  --radius-sm:6px;
  --radius-lg:14px;
  --border:#e2e8f0;
  --border-light:#f1f5f9;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font)}
body{background:var(--bg-gradient);color:var(--text-1);user-select:none;-webkit-user-select:none}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,0.5)}

/* 侧边栏 */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;box-shadow:2px 0 12px rgba(30,58,95,0.04)}
.sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--border-light)}
.sidebar-brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#60a5fa,#3b82f6);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:16px;box-shadow:0 2px 8px rgba(59,130,246,0.3)}
.brand-title{font-size:15px;font-weight:700;color:var(--text-1)}
.sidebar-tabs{display:flex;gap:4px;padding:10px 12px 6px}
.sidebar-tab{flex:1;padding:6px;border-radius:6px;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;color:var(--text-3);cursor:pointer;transition:all 0.15s}
.sidebar-tab:hover{background:var(--sidebar-hover)}
.sidebar-tab.active{background:var(--accent-light);color:var(--accent-hover)}
.sidebar-tab .tab-count{font-size:10px;opacity:0.7;margin-left:3px}
.project-list{flex:1;overflow-y:auto;padding:0 8px 8px}
.sidebar-section-label{padding:10px 10px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-3)}
.project-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-2);font-weight:500;transition:all 0.15s;margin-bottom:2px}
.project-item:hover{background:var(--sidebar-hover);color:var(--text-1)}
.project-item.active{background:var(--sidebar-active);color:var(--accent-hover);font-weight:600}
.project-item .project-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.project-item .project-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-item .project-actions{display:flex;gap:2px;opacity:0}
.project-item:hover .project-actions{opacity:1}
.project-item .proj-act{width:22px;height:22px;border:none;background:transparent;color:var(--text-3);cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px}
.project-item .proj-act:hover{background:var(--border-light);color:var(--text-1)}
.project-item .proj-act.archive:hover{background:var(--archive-light);color:var(--archive)}
.project-item .proj-act.del:hover{background:var(--danger-light);color:var(--danger)}
.project-item.archived-item{opacity:0.7}
.project-item.archived-item .project-name{font-style:italic}
.add-project{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-3);display:flex;align-items:center;gap:8px;transition:all 0.15s}
.add-project:hover{background:var(--sidebar-hover);color:var(--accent)}
.empty-hint{padding:20px 14px;text-align:center;font-size:12px;color:var(--text-3);line-height:1.6}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border-light)}
.recycle-btn{width:100%;display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-2);font-weight:500;transition:all 0.15s;border:none;background:transparent;font-family:inherit}
.recycle-btn:hover{background:var(--sidebar-hover);color:var(--text-1)}
.recycle-btn.active{background:var(--danger-light);color:var(--danger)}
.recycle-icon{font-size:16px}
.recycle-count{margin-left:auto;background:var(--border);color:var(--text-2);padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
.recycle-btn.active .recycle-count{background:var(--danger);color:#fff}

/* 主区域 */
.main{margin-left:240px;height:100vh;display:flex;flex-direction:column}
.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(255,255,255,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border-light);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0}
.topbar-title{font-size:17px;font-weight:700;color:var(--text-1);display:flex;align-items:center;gap:8px}
.archive-badge{font-size:11px;background:var(--archive-light);color:var(--archive);padding:2px 8px;border-radius:10px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--text-3)}
.topbar-actions{display:flex;gap:8px}
.btn{border:none;cursor:pointer;font-family:inherit;font-size:13px;padding:7px 13px;border-radius:7px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s ease}
.btn-ghost{background:rgba(255,255,255,0.8);color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{background:#fff;color:var(--text-1);border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{width:28px;height:28px;border-radius:6px;padding:0;background:transparent;color:var(--text-3);border:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.btn-icon:hover{background:var(--border-light);color:var(--text-1)}
.btn-icon.danger:hover{background:var(--danger-light);color:var(--danger)}

/* 看板 */
.board-scroll{flex:1;overflow-x:auto;overflow-y:hidden;padding:18px}
.board{display:flex;align-items:flex-start;gap:14px;min-height:calc(100vh - 56px - 36px);width:max-content}
.list{flex:0 0 290px;background:var(--list-bg);border-radius:var(--radius-lg);display:flex;flex-direction:column;max-height:calc(100vh - 56px - 72px);border:1px solid var(--list-border);box-shadow:0 1px 3px rgba(30,58,95,0.04)}
.list.list-drag-over{background:var(--list-bg-hover);border-color:var(--accent)}
.list.dragging-list{opacity:0.35}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:12px 12px 8px;gap:8px}
.list-title-wrap{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.list-title{flex:1;font-size:14px;font-weight:700;color:var(--text-1);padding:4px 8px;border-radius:5px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.list-title:hover{background:var(--border-light)}
.list-title-input{flex:1;font-size:14px;font-weight:700;color:var(--text-1);background:#fff;border:2px solid var(--accent);padding:4px 8px;border-radius:5px;outline:none;font-family:inherit;min-width:0}
.list-count{font-size:11px;color:var(--text-3);background:var(--border-light);padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0}
.cards-container{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 8px 8px;display:flex;flex-direction:column;gap:8px;min-height:40px}
.cards-container::-webkit-scrollbar{width:5px}
.cards-container::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.25);border-radius:3px}
.list-footer{padding:6px 8px 8px}
.add-card-btn{width:100%;padding:8px;border:none;border-radius:6px;background:transparent;color:var(--text-3);font-family:inherit;font-size:13px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:6px;transition:all 0.15s}
.add-card-btn:hover{background:var(--border-light);color:var(--accent)}

/* 卡片 */
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:10px 12px;cursor:grab;transition:box-shadow 0.15s,transform 0.15s;position:relative;border:1px solid var(--border-light);will-change:transform}
.card:hover{box-shadow:var(--card-shadow-hover);transform:translateY(-1px);border-color:var(--accent-light)}
.card:active{cursor:grabbing}
.card.dragging{opacity:0.3}
.card.dragging-clone{opacity:1;cursor:grabbing;box-shadow:var(--card-shadow-drag);pointer-events:none;position:fixed;z-index:9999;will-change:transform}
.card-labels{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.card-label{height:6px;border-radius:3px;flex:1;min-width:20px}
.card-title{font-size:13.5px;line-height:1.4;color:var(--text-1);word-break:break-word;font-weight:500}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11px;color:var(--text-3)}
.card-meta-item{display:flex;align-items:center;gap:3px}
.subtask-progress{display:inline-flex;align-items:center;gap:5px}
.subtask-bar{width:34px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.subtask-bar-fill{height:100%;background:var(--success);transition:width 0.3s}
.card-date.overdue{color:var(--danger);font-weight:600}
.card-start-date{color:var(--accent)}

.add-list{flex:0 0 290px;background:rgba(255,255,255,0.5);border-radius:var(--radius-lg);border:1px dashed var(--border)}
.add-list-btn{width:100%;padding:14px;border:none;background:transparent;color:var(--text-3);font-family:inherit;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;justify-content:center;border-radius:var(--radius-lg)}
.add-list-btn:hover{color:var(--accent);background:rgba(59,130,246,0.05)}
.add-list-form{padding:10px;display:none;flex-direction:column;gap:8px}
.add-list-form.active{display:flex}
.add-list-input{padding:8px 10px;border:2px solid var(--accent);border-radius:6px;font-family:inherit;font-size:14px;outline:none}

/* 回收站 */
.recycle-view{flex:1;overflow-y:auto;padding:24px 28px}
.recycle-empty{text-align:center;padding:80px 20px;color:var(--text-3)}
.recycle-empty-icon{font-size:48px;margin-bottom:12px;opacity:0.4}
.recycle-empty-text{font-size:15px}
.recycle-list{display:flex;flex-direction:column;gap:12px;max-width:820px}
.recycle-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:0 1px 2px rgba(30,58,95,0.04);transition:all 0.15s}
.recycle-item:hover{box-shadow:0 4px 12px rgba(30,58,95,0.08);border-color:var(--accent-light)}
.recycle-item-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.recycle-type-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.5px}
.recycle-type-tag.list{background:var(--archive-light);color:var(--archive)}
.recycle-type-tag.card{background:var(--accent-light);color:var(--accent)}
.recycle-item-title{font-size:15px;font-weight:600;color:var(--text-1);flex:1;min-width:0}
.recycle-item-meta{font-size:11px;color:var(--text-3);display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px}
.recycle-meta-chip{display:inline-flex;align-items:center;gap:4px}
.recycle-meta-chip .chip-label{color:var(--text-3)}
.recycle-meta-chip .chip-val{color:var(--text-2);font-weight:600}
.recycle-item-actions{display:flex;gap:6px}
.recycle-list-cards{margin-top:8px;padding:8px 10px;background:var(--border-light);border-radius:6px;font-size:12px;color:var(--text-2);display:flex;flex-wrap:wrap;gap:6px}
.recycle-mini-card{background:#fff;padding:3px 8px;border-radius:4px;border:1px solid var(--border)}

/* 弹窗 */
.modal-backdrop{position:fixed;inset:0;background:rgba(30,58,95,0.25);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.25s ease}
.modal-backdrop.active{opacity:1;pointer-events:auto}
.modal{position:fixed;width:min(680px,92vw);max-height:88vh;background:#fff;border-radius:var(--radius-lg);box-shadow:0 24px 64px rgba(30,58,95,0.2),0 8px 20px rgba(30,58,95,0.1);z-index:1001;display:flex;flex-direction:column;overflow:hidden;transform-origin:0 0;opacity:0;pointer-events:none}
.modal.active{pointer-events:auto}
.modal.closing{opacity:0 !important;transition:opacity 0.2s ease,transform 0.2s ease}
.modal-header{padding:16px 20px 12px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border-light)}
.modal-title-input{flex:1;font-size:18px;font-weight:700;color:var(--text-1);border:none;outline:none;font-family:inherit;background:transparent;padding:4px 6px;border-radius:5px;word-break:break-word}
.modal-title-input:focus{background:var(--border-light)}
.modal-close{width:32px;height:32px;border:none;border-radius:6px;background:transparent;color:var(--text-3);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-close:hover{background:var(--border-light);color:var(--text-1)}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px 20px;display:grid;grid-template-columns:1fr 200px;gap:20px}
.modal-main{display:flex;flex-direction:column;gap:18px;min-width:0}
.modal-side{display:flex;flex-direction:column;gap:14px}
.modal-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);margin-bottom:8px}
.labels-editor{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.label-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:12px;font-weight:600;color:#fff;cursor:default}
.label-remove{cursor:pointer;opacity:0.8;font-size:14px;line-height:1}
.label-remove:hover{opacity:1}
.label-add-btn{padding:3px 9px;border-radius:5px;border:1px dashed var(--text-3);background:transparent;color:var(--text-3);font-size:12px;cursor:pointer;font-family:inherit}
.label-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.label-palette{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;padding:8px;background:var(--border-light);border-radius:8px}
.label-color-opt{height:28px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;border:2px solid transparent;transition:transform 0.1s}
.label-color-opt:hover{transform:scale(1.05)}
.desc-editor{width:100%;min-height:80px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text-1);outline:none;resize:vertical;line-height:1.5}
.desc-editor:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.12)}
.subtask-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:6px;transition:background 0.12s}
.subtask-item:hover{background:var(--border-light)}
.subtask-check{width:18px;height:18px;border-radius:4px;border:2px solid #cbd5e0;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.subtask-check.done{background:var(--success);border-color:var(--success)}
.subtask-check.done::after{content:"✓";color:#fff;font-size:12px;font-weight:700}
.subtask-text{flex:1;font-size:13px;color:var(--text-1);background:transparent;border:none;outline:none;font-family:inherit;padding:2px 4px;border-radius:3px}
.subtask-text.done{color:var(--text-3);text-decoration:line-through}
.subtask-text:focus{background:var(--border-light)}
.subtask-del{opacity:0;width:22px;height:22px;border:none;border-radius:4px;background:transparent;color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.subtask-item:hover .subtask-del{opacity:1}
.subtask-del:hover{background:var(--danger-light);color:var(--danger)}
.subtask-add{display:flex;align-items:center;gap:10px;padding:7px 8px}
.subtask-add-btn{width:18px;height:18px;border-radius:4px;border:2px solid #cbd5e0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#cbd5e0;font-size:14px;line-height:1;flex-shrink:0;background:transparent}
.subtask-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.subtask-add-input{flex:1;border:none;outline:none;font-family:inherit;font-size:13px;background:transparent;color:var(--text-1);padding:2px 4px}
.subtask-add-input::placeholder{color:var(--text-3)}
.side-group{background:var(--border-light);border-radius:8px;padding:10px}
.side-group-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);margin-bottom:6px}
.side-action{width:100%;padding:7px 10px;border:none;border-radius:6px;background:transparent;color:var(--text-2);font-family:inherit;font-size:12px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:7px}
.side-action:hover{background:rgba(255,255,255,0.6);color:var(--text-1)}
.side-action.danger:hover{background:var(--danger-light);color:var(--danger)}
.date-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-family:inherit;font-size:12px;color:var(--text-1);outline:none}
.date-input:focus{border-color:var(--accent)}
@media (max-width:768px){.sidebar{width:60px}.sidebar-header,.sidebar-section-label,.project-name,.add-project span,.recycle-btn span,.recycle-count,.sidebar-tab,.sidebar-tabs{display:none}.main{margin-left:60px}.modal-body{grid-template-columns:1fr}.modal-side{order:-1}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <div class="brand-logo">F</div>
      <div class="brand-title">Flow Board</div>
    </div>
  </div>
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" id="tab-active" onclick="setProjectFilter('active')">活跃<span class="tab-count" id="count-active"></span></button>
    <button class="sidebar-tab" id="tab-archived" onclick="setProjectFilter('archived')">归档<span class="tab-count" id="count-archived"></span></button>
  </div>
  <div class="project-list" id="project-list"></div>
  <div class="sidebar-footer">
    <button class="recycle-btn" id="recycle-btn" onclick="toggleRecycleView()">
      <span class="recycle-icon">🗑</span>
      <span>回收站</span>
      <span class="recycle-count" id="recycle-count">0</span>
    </button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="topbar-title" id="topbar-title">看板</div>
        <div class="topbar-sub" id="topbar-sub"></div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost" onclick="exportData()">导出</button>
      <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">导入</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
  <div class="board-scroll" id="board-scroll"><div class="board" id="board"></div></div>
  <div class="recycle-view" id="recycle-view" style="display:none"><div id="recycle-content"></div></div>
</div>

<div class="modal-backdrop" id="modal-backdrop"></div>
<div class="modal" id="modal">
  <div class="modal-header">
    <input class="modal-title-input" id="modal-title" placeholder="输入卡片标题…">
    <button class="modal-close" onclick="closeModal()">×</button>
  </div>
  <div class="modal-body">
    <div class="modal-main">
      <div><div class="modal-section-label">标签</div><div class="labels-editor" id="labels-editor"></div><div class="label-palette" id="label-palette" style="display:none"></div></div>
      <div><div class="modal-section-label">描述</div><textarea class="desc-editor" id="modal-desc" placeholder="添加更详细的描述…"></textarea></div>
      <div><div class="modal-section-label">子任务清单</div><div class="subtasks" id="subtasks"></div></div>
    </div>
    <div class="modal-side">
      <div class="side-group"><div class="side-group-label">列表</div><div id="modal-list-name" style="font-size:13px;font-weight:600;color:var(--text-1);padding:2px 4px"></div></div>
      <div class="side-group"><div class="side-group-label">开始日期</div><input type="date" class="date-input" id="modal-start-date"></div>
      <div class="side-group"><div class="side-group-label">截止日期</div><input type="date" class="date-input" id="modal-date"></div>
      <div class="side-group"><div class="side-group-label">操作</div><button class="side-action danger" onclick="moveCurrentCardToRecycle()">🗑 移到回收站</button></div>
    </div>
  </div>
</div>

<!-- 添加卡片弹窗 -->
<div class="modal-backdrop" id="add-card-backdrop"></div>
<div class="modal" id="add-card-modal">
  <div class="modal-header">
    <input class="modal-title-input" id="add-card-title" placeholder="输入卡片标题…">
    <button class="modal-close" onclick="closeAddCardModal()">×</button>
  </div>
  <div class="modal-body">
    <div class="modal-main">
      <div><div class="modal-section-label">标签</div><div class="labels-editor" id="add-card-labels-editor"></div><div class="label-palette" id="add-card-label-palette" style="display:none"></div></div>
      <div><div class="modal-section-label">描述</div><textarea class="desc-editor" id="add-card-desc" placeholder="添加更详细的描述…（可选）"></textarea></div>
      <div><div class="modal-section-label">子任务清单</div><div class="subtasks" id="add-card-subtasks"></div></div>
    </div>
    <div class="modal-side">
      <div class="side-group"><div class="side-group-label">添加到列表</div><div id="add-card-list-name" style="font-size:13px;font-weight:600;color:var(--text-1);padding:2px 4px"></div></div>
      <div class="side-group"><div class="side-group-label">开始日期</div><input type="date" class="date-input" id="add-card-start-date"></div>
      <div class="side-group"><div class="side-group-label">截止日期</div><input type="date" class="date-input" id="add-card-date"></div>
      <div class="side-group"><div class="side-group-label">操作</div><button class="side-action" style="background:var(--accent);color:#fff;font-weight:600" onclick="confirmAddCard()">✓ 添加卡片</button></div>
    </div>
  </div>
</div>

<script>
const LABEL_COLORS=[
  {name:'蓝色',value:'#3b82f6'},{name:'青色',value:'#06b6d4'},
  {name:'绿色',value:'#10b981'},{name:'紫色',value:'#8b5cf6'},
  {name:'粉色',value:'#ec4899'},{name:'红色',value:'#ef4444'},
  {name:'橙色',value:'#f59e0b'},{name:'黄色',value:'#eab308'},
  {name:'靛蓝',value:'#6366f1'},{name:'石板',value:'#64748b'},
];
const PROJECT_COLORS=['#3b82f6','#06b6d4','#10b981','#8b5cf6','#ec4899','#f59e0b','#6366f1','#ef4444'];

let state={projects:[],currentProjectId:null,view:'board',projectFilter:'active'};

/* ========== 持久化：localStorage 自动存取 ========== */
const STORAGE_KEY='flow-board-state-v1';
function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){console.warn('保存失败',e)}
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const parsed=JSON.parse(raw);
    if(!parsed||!Array.isArray(parsed.projects)||parsed.projects.length===0)return false;
    state=parsed;
    if(!state.currentProjectId||!state.projects.find(p=>p.id===state.currentProjectId)){
      state.currentProjectId=state.projects[0].id;
    }
    if(!state.view)state.view='board';
    if(!state.projectFilter)state.projectFilter='active';
    return true;
  }catch(e){console.warn('加载失败',e);return false}
}
function exportState(){return JSON.stringify(state,null,2)}
function importState(jsonStr){
  try{
    const parsed=JSON.parse(jsonStr);
    if(!parsed||!Array.isArray(parsed.projects))throw new Error('格式错误');
    state=parsed;
    state.currentProjectId=state.projects[0]?state.projects[0].id:null;
    state.view='board';state.projectFilter='active';
    saveState();renderAll();
    return true;
  }catch(e){alert('导入失败: '+e.message);return false}
}
function clearAllData(){
  if(!confirm('确定清空所有数据？此操作不可恢复！'))return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function L(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}

/* 新建项目：4 个空列表，无示例卡片 */
function createDefaultProject(name,withSample=false){
  const p={id:L(),name,color:PROJECT_COLORS[state.projects.length%PROJECT_COLORS.length],archived:false,lists:[
    {id:L(),title:'待办',cards:[]},
    {id:L(),title:'进行中',cards:[]},
    {id:L(),title:'已完成',cards:[]},
    {id:L(),title:'归档',cards:[]},
  ],recycleBin:[]};
  if(withSample)fillSampleCards(p);
  return p;
}
function fillSampleCards(p){
  p.lists[0].cards.push(
    {id:L(),title:'设计登录页原型',labels:[{c:'#3b82f6',n:'设计'}],desc:'完成首页与登录页高保真原型。',startDate:'2026-07-15',date:'2026-07-25',subtasks:[
      {id:L(),text:'收集竞品参考',done:true},{id:L(),text:'绘制线框图',done:true},
      {id:L(),text:'高保真视觉稿',done:false},{id:L(),text:'交互说明文档',done:false}]},
    {id:L(),title:'撰写产品需求文档',labels:[{c:'#8b5cf6',n:'文档'}],desc:'',date:'',subtasks:[]},
    {id:L(),title:'整理用户反馈',labels:[{c:'#f59e0b',n:'调研'}],desc:'',date:'',subtasks:[
      {id:L(),text:'导出访谈录音',done:false},{id:L(),text:'逐条转录要点',done:false}]},
  );
  p.lists[1].cards.push(
    {id:L(),title:'开发看板拖拽功能',labels:[{c:'#10b981',n:'开发'}],desc:'',date:'',subtasks:[
      {id:L(),text:'拖拽基础逻辑',done:true},{id:L(),text:'FLIP 动画',done:true},{id:L(),text:'边缘自动滚动',done:false}]},
    {id:L(),title:'API 接口联调',labels:[{c:'#ef4444',n:'后端'}],desc:'',date:'',subtasks:[]},
  );
  p.lists[2].cards.push(
    {id:L(),title:'项目初始化',labels:[{c:'#10b981',n:'开发'}],desc:'',date:'',subtasks:[
      {id:L(),text:'选择技术栈',done:true},{id:L(),text:'配置开发环境',done:true}]},
  );
}

// 初始化：优先从 localStorage 加载，首次使用才填示例数据
if(!loadState()){
  state.projects.push(createDefaultProject('Flow Board 看板',true));
  state.projects.push(createDefaultProject('示例项目'));
  state.currentProjectId=state.projects[0].id;
  saveState();
}

// 包装 renderAll：每次渲染前自动保存，确保所有改动都持久化
const _origRenderAll=renderAll;
renderAll=function(){_origRenderAll();saveState()};

function currentProject(){return state.projects.find(p=>p.id===state.currentProjectId)}
function cardProgress(card){const d=(card.subtasks||[]).filter(s=>s.done).length,t=(card.subtasks||[]).length;return t?`${d}/${t}`:'—'}

/* 侧边栏 */
function renderSidebar(){
  const list=document.getElementById('project-list');
  list.innerHTML='';
  const active=state.projects.filter(p=>!p.archived);
  const archived=state.projects.filter(p=>p.archived);
  document.getElementById('count-active').textContent=active.length?'·'+active.length:'';
  document.getElementById('count-archived').textContent=archived.length?'·'+archived.length:'';
  
  const showList=state.projectFilter==='active'?active:archived;
  if(showList.length===0){
    list.innerHTML=`<div class="empty-hint">${state.projectFilter==='active'?'暂无活跃项目<br>点击下方新建':'暂无归档项目'}</div>`;
  } else {
    showList.forEach(p=>{
      const item=document.createElement('div');
      item.className='project-item'+(p.id===state.currentProjectId&&state.view==='board'?' active':'')+(p.archived?' archived-item':'');
      item.innerHTML=`
        <div class="project-dot" style="background:${p.color}"></div>
        <span class="project-name">${escapeHtml(p.name)}</span>
        <div class="project-actions">
          <button class="proj-act archive" title="${p.archived?'取消归档':'归档项目'}" onclick="event.stopPropagation();toggleArchiveProject('${p.id}')">${p.archived?'↩':'📦'}</button>
          <button class="proj-act del" title="删除项目" onclick="event.stopPropagation();deleteProject('${p.id}')">×</button>
        </div>`;
      item.onclick=()=>switchProject(p.id);
      list.appendChild(item);
    });
  }
  if(state.projectFilter==='active'){
    const addBtn=document.createElement('div');
    addBtn.className='add-project';
    addBtn.innerHTML='+ 新建项目';
    addBtn.onclick=()=>addProject();
    list.appendChild(addBtn);
  }
  const cp=currentProject();
  document.getElementById('recycle-count').textContent=cp?cp.recycleBin.length:0;
  document.getElementById('recycle-btn').classList.toggle('active',state.view==='recycle');
  document.getElementById('tab-active').classList.toggle('active',state.projectFilter==='active');
  document.getElementById('tab-archived').classList.toggle('active',state.projectFilter==='archived');
}

function setProjectFilter(f){state.projectFilter=f;renderSidebar()}
function switchProject(id){state.currentProjectId=id;state.view='board';renderAll()}
function addProject(){
  const name=prompt('输入项目名称：');
  if(!name||!name.trim())return;
  const p=createDefaultProject(name.trim());
  state.projects.push(p);
  state.currentProjectId=p.id;
  state.view='board';
  state.projectFilter='active';
  renderAll();
}
function deleteProject(id){
  if(state.projects.filter(p=>!p.archived).length<=1&&state.projects.find(p=>p.id===id)&&!state.projects.find(p=>p.id===id).archived){alert('至少保留一个活跃项目');return}
  if(!confirm('删除项目将同时删除其看板和回收站，确定？'))return;
  state.projects=state.projects.filter(p=>p.id!==id);
  if(state.currentProjectId===id)state.currentProjectId=state.projects[0].id;
  renderAll();
}
function toggleArchiveProject(id){
  const p=state.projects.find(x=>x.id===id);
  if(!p)return;
  if(!p.archived&&state.projects.filter(x=>!x.archived).length<=1){alert('至少保留一个活跃项目');return}
  p.archived=!p.archived;
  if(p.archived&&state.currentProjectId===id){
    const next=state.projects.find(x=>!x.archived);
    state.currentProjectId=next?next.id:p.id;
    state.view='board';
  }
  renderAll();
}
function toggleRecycleView(){state.view=state.view==='recycle'?'board':'recycle';renderAll()}

/* 主区域 */
function renderAll(){
  renderSidebar();
  const boardScroll=document.getElementById('board-scroll');
  const recycleView=document.getElementById('recycle-view');
  const topbarTitle=document.getElementById('topbar-title');
  const topbarSub=document.getElementById('topbar-sub');
  const cp=currentProject();
  if(!cp){
    boardScroll.style.display='none';recycleView.style.display='block';
    topbarTitle.textContent='无项目';topbarSub.textContent='';
    document.getElementById('recycle-content').innerHTML='<div class="empty-hint">请先创建项目</div>';
    return;
  }
  if(state.view==='recycle'){
    boardScroll.style.display='none';recycleView.style.display='block';
    topbarTitle.innerHTML=escapeHtml(cp.name)+' · 回收站';
    topbarSub.textContent='已删除的列表和卡片可恢复或彻底清除';
    renderRecycleView();
  } else {
    boardScroll.style.display='block';recycleView.style.display='none';
    topbarTitle.innerHTML=escapeHtml(cp.name)+(cp.archived?'<span class="archive-badge">已归档</span>':'');
    const cardCount=cp.lists.reduce((s,l)=>s+l.cards.length,0);
    topbarSub.textContent=cp.lists.length+' 个列表 · '+cardCount+' 张卡片';
    renderBoard();
  }
}

function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const cp=currentProject();
  cp.lists.forEach(list=>board.appendChild(createListElement(list)));
  const addListWrap=document.createElement('div');
  addListWrap.className='add-list';
  addListWrap.innerHTML=`<button class="add-list-btn" onclick="this.parentElement.querySelector('.add-list-form').classList.add('active');this.style.display='none';this.parentElement.querySelector('.add-list-input').focus()">+ 添加列表</button>
    <div class="add-list-form"><input class="add-list-input" placeholder="输入列表标题…" onkeydown="if(event.key==='Enter')addList(this);if(event.key==='Escape'){this.parentElement.classList.remove('active');this.value='';this.parentElement.previousElementSibling.style.display='flex'}"><div style="display:flex;gap:6px"><button class="btn btn-primary" onclick="addList(this.parentElement.previousElementSibling)">添加</button><button class="btn-icon" onclick="this.closest('.add-list').querySelector('.add-list-form').classList.remove('active');this.closest('.add-list').querySelector('.add-list-input').value='';this.closest('.add-list').querySelector('.add-list-btn').style.display='flex'">×</button></div></div>`;
  board.appendChild(addListWrap);
}

function createListElement(list){
  const el=document.createElement('div');
  el.className='list';el.dataset.id=list.id;
  el.innerHTML=`<div class="list-header"><div class="list-title-wrap"><div class="list-title" onclick="editListTitle(this)">${escapeHtml(list.title)}</div><span class="list-count">${list.cards.length}</span></div><button class="btn-icon danger" title="删除列表到回收站" onclick="deleteList('${list.id}')">🗑</button></div><div class="cards-container"></div><div class="list-footer"><button class="add-card-btn" onclick="openAddCardModal('${list.id}')">+ 添加卡片</button></div>`;
  const cc=el.querySelector('.cards-container');
  list.cards.forEach(card=>cc.appendChild(createCardElement(card,list.id)));
  return el;
}

function createCardElement(card,listId){
  const el=document.createElement('div');
  el.className='card';el.dataset.id=card.id;el.dataset.listId=listId;
  el.innerHTML=getCardInnerHtml(card);
  return el;
}
function getCardInnerHtml(card){
  const labelsHtml=card.labels&&card.labels.length?`<div class="card-labels">${card.labels.map(l=>`<div class="card-label" style="background:${l.c}" title="${escapeHtml(l.n||'')}"></div>`).join('')}</div>`:'';
  const d=(card.subtasks||[]).filter(s=>s.done).length,t=(card.subtasks||[]).length;
  const subtaskHtml=t?`<div class="subtask-progress"><div class="subtask-bar"><div class="subtask-bar-fill" style="width:${d/t*100}%"></div></div><span>${d}/${t}</span></div>`:'';
  const descHtml=card.desc?`<div class="card-meta-item">☰</div>`:'';
  const startDateHtml=card.startDate?`<div class="card-meta-item card-start-date">▶ ${card.startDate}</div>`:'';
  const dateHtml=card.date?`<div class="card-meta-item card-date ${isOverdue(card.date)?'overdue':''}">📅 ${card.date}</div>`:'';
  return `${labelsHtml}<div class="card-title">${escapeHtml(card.title)}</div>${(descHtml||subtaskHtml||startDateHtml||dateHtml)?`<div class="card-meta">${descHtml}${subtaskHtml}${startDateHtml}${dateHtml}</div>`:''}`;
}
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function isOverdue(d){if(!d)return false;return d<new Date().toISOString().slice(0,10)}

/* 列表/卡片 增删改 */
function editListTitle(el){
  const listEl=el.closest('.list');const list=findList(listEl.dataset.id);
  const input=document.createElement('input');input.className='list-title-input';input.value=list.title;
  el.replaceWith(input);input.focus();input.select();
  input.addEventListener('blur',()=>{list.title=input.value.trim()||list.title;renderBoard()});
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();input.blur()}if(e.key==='Escape')renderBoard()});
}
/* 列表删除：整个列表作为一条入回收站 */
function deleteList(id){
  const cp=currentProject();const list=findList(id);if(!list)return;
  if(!confirm(`将整个列表「${list.title}」及其 ${list.cards.length} 张卡片移入回收站？`))return;
  cp.recycleBin.push({type:'list',id:list.id,title:list.title,cards:list.cards.slice(),deletedAt:new Date().toISOString(),fromProjectName:cp.name});
  cp.lists=cp.lists.filter(l=>l.id!==id);
  renderAll();
}
function addList(inputEl){
  const title=inputEl.value.trim();if(!title){inputEl.focus();return}
  currentProject().lists.push({id:L(),title,cards:[]});renderAll();
}
/* 添加卡片弹窗 */
let addCardTargetListId=null;
let addCardDraft={labels:[],subtasks:[]};
function openAddCardModal(listId){
  addCardTargetListId=listId;
  addCardDraft={labels:[],subtasks:[]};
  const list=findList(listId);
  if(!list)return;
  document.getElementById('add-card-list-name').textContent=list.title;
  document.getElementById('add-card-title').value='';
  document.getElementById('add-card-desc').value='';
  document.getElementById('add-card-start-date').value='';
  document.getElementById('add-card-date').value='';
  renderAddCardLabelsEditor();
  renderAddCardLabelPalette();
  renderAddCardSubtasks();
  const modal=document.getElementById('add-card-modal');
  const backdrop=document.getElementById('add-card-backdrop');
  const targetW=Math.min(680,window.innerWidth*0.92);
  const targetH=Math.min(window.innerHeight*0.6,420);
  const targetX=(window.innerWidth-targetW)/2;
  const targetY=(window.innerHeight-targetH)/2;
  modal.style.width=targetW+'px';modal.style.left=targetX+'px';modal.style.top=targetY+'px';
  modal.style.transform='scale(0.9)';modal.style.opacity='0';modal.style.transition='none';
  backdrop.classList.add('active');modal.classList.add('active');modal.style.display='flex';
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{modal.style.transition='transform 0.28s cubic-bezier(0.2,0.8,0.2,1),opacity 0.2s ease';modal.style.transform='scale(1)';modal.style.opacity='1'})});
  document.getElementById('add-card-title').focus();
  document.getElementById('add-card-title').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();confirmAddCard()}if(e.key==='Escape')closeAddCardModal()};
  backdrop.onclick=()=>closeAddCardModal();
}
function closeAddCardModal(){
  const modal=document.getElementById('add-card-modal');
  const backdrop=document.getElementById('add-card-backdrop');
  if(!modal.classList.contains('active'))return;
  modal.style.transform='scale(0.9)';modal.style.opacity='0';backdrop.style.opacity='0';
  setTimeout(()=>{modal.classList.remove('active');backdrop.classList.remove('active');backdrop.style.opacity='';modal.style.display='none';modal.style.transition='';addCardTargetListId=null;addCardDraft={labels:[],subtasks:[]}},250);
}
function confirmAddCard(){
  if(!addCardTargetListId)return;
  const title=document.getElementById('add-card-title').value.trim();
  if(!title){document.getElementById('add-card-title').focus();return}
  const desc=document.getElementById('add-card-desc').value.trim();
  const startDate=document.getElementById('add-card-start-date').value;
  const date=document.getElementById('add-card-date').value;
  findList(addCardTargetListId).cards.push({id:L(),title,labels:addCardDraft.labels.slice(),desc,startDate,date,subtasks:addCardDraft.subtasks.slice()});
  closeAddCardModal();renderAll();
}
function renderAddCardLabelsEditor(){
  const editor=document.getElementById('add-card-labels-editor');editor.innerHTML='';
  if(addCardDraft.labels.length){
    addCardDraft.labels.forEach((l,i)=>{
      const chip=document.createElement('div');chip.className='label-chip';chip.style.background=l.c;
      chip.innerHTML=escapeHtml(l.n||'')+' <span class="label-remove" onclick="removeAddCardLabel('+i+')">×</span>';
      editor.appendChild(chip);
    });
  }
  const addBtn=document.createElement('button');addBtn.className='label-add-btn';addBtn.textContent='+ 添加标签';
  addBtn.onclick=()=>{const p=document.getElementById('add-card-label-palette');p.style.display=p.style.display==='grid'?'none':'grid'};
  editor.appendChild(addBtn);
}
function renderAddCardLabelPalette(){
  const p=document.getElementById('add-card-label-palette');p.innerHTML='';
  LABEL_COLORS.forEach(lc=>{
    const opt=document.createElement('div');opt.className='label-color-opt';opt.style.background=lc.value;opt.textContent=lc.name;
    opt.onclick=()=>{
      if(addCardDraft.labels.find(l=>l.c===lc.value))addCardDraft.labels=addCardDraft.labels.filter(l=>l.c!==lc.value);
      else addCardDraft.labels.push({c:lc.value,n:lc.name});
      renderAddCardLabelsEditor();renderAddCardLabelPalette();
    };
    p.appendChild(opt);
  });
}
function removeAddCardLabel(idx){addCardDraft.labels.splice(idx,1);renderAddCardLabelsEditor();renderAddCardLabelPalette()}
function renderAddCardSubtasks(){
  const container=document.getElementById('add-card-subtasks');container.innerHTML='';
  addCardDraft.subtasks.forEach(s=>{
    const item=document.createElement('div');item.className='subtask-item';
    item.innerHTML='<div class="subtask-check '+(s.done?'done':'')+'" onclick="toggleAddCardSubtask(\''+s.id+'\')"></div><input class="subtask-text '+(s.done?'done':'')+'" value="'+escapeHtml(s.text)+'" onchange="updateAddCardSubtaskText(\''+s.id+'\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"><button class="subtask-del" onclick="deleteAddCardSubtask(\''+s.id+'\')">×</button>';
    container.appendChild(item);
  });
  const add=document.createElement('div');add.className='subtask-add';
  add.innerHTML='<button class="subtask-add-btn">+</button><input class="subtask-add-input" placeholder="添加子任务…" onkeydown="if(event.key===\'Enter\'){addAddCardSubtask(this.value);this.value=\'\'}">';
  add.querySelector('.subtask-add-btn').onclick=()=>{const i=add.querySelector('.subtask-add-input');addAddCardSubtask(i.value);i.value=''};
  container.appendChild(add);
}
function addAddCardSubtask(text){if(!text.trim())return;addCardDraft.subtasks.push({id:L(),text:text.trim(),done:false});renderAddCardSubtasks()}
function toggleAddCardSubtask(id){const s=addCardDraft.subtasks.find(s=>s.id===id);if(s){s.done=!s.done;renderAddCardSubtasks()}}
function updateAddCardSubtaskText(id,text){const s=addCardDraft.subtasks.find(s=>s.id===id);if(s)s.text=text}
function deleteAddCardSubtask(id){addCardDraft.subtasks=addCardDraft.subtasks.filter(s=>s.id!==id);renderAddCardSubtasks()}
function findList(id){return currentProject().lists.find(l=>l.id===id)}

/* 回收站视图 — 区分 list / card */
function renderRecycleView(){
  const cp=currentProject();const content=document.getElementById('recycle-content');
  if(cp.recycleBin.length===0){
    content.innerHTML=`<div class="recycle-empty"><div class="recycle-empty-icon">🗑</div><div class="recycle-empty-text">回收站为空</div></div>`;return;
  }
  content.innerHTML='<div class="recycle-list"></div>';
  const list=content.querySelector('.recycle-list');
  cp.recycleBin.slice().reverse().forEach(item=>{
    const el=document.createElement('div');el.className='recycle-item';
    const delDate=new Date(item.deletedAt).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    if(item.type==='list'){
      el.innerHTML=`
        <div class="recycle-item-head">
          <span class="recycle-type-tag list">列表</span>
          <div class="recycle-item-title">${escapeHtml(item.title)}</div>
        </div>
        <div class="recycle-item-meta">
          <div class="recycle-meta-chip"><span class="chip-label">来自项目：</span><span class="chip-val">${escapeHtml(item.fromProjectName||cp.name)}</span></div>
          <div class="recycle-meta-chip"><span class="chip-label">含卡片：</span><span class="chip-val">${item.cards.length} 张</span></div>
          <div class="recycle-meta-chip"><span class="chip-label">删除于：</span><span class="chip-val">${delDate}</span></div>
        </div>
        ${item.cards.length?`<div class="recycle-list-cards">${item.cards.map(c=>`<span class="recycle-mini-card">${escapeHtml(c.title)}</span>`).join('')}</div>`:''}
        <div class="recycle-item-actions">
          <button class="btn btn-ghost btn-sm" onclick="restoreItem('${item.id}')">恢复列表</button>
          <button class="btn btn-danger btn-sm" onclick="permanentlyDeleteItem('${item.id}')">彻底删除</button>
        </div>`;
    } else {
      const prog=cardProgress(item);
      el.innerHTML=`
        <div class="recycle-item-head">
          <span class="recycle-type-tag card">卡片</span>
          <div class="recycle-item-title">${escapeHtml(item.title)}</div>
        </div>
        <div class="recycle-item-meta">
          <div class="recycle-meta-chip"><span class="chip-label">来自项目：</span><span class="chip-val">${escapeHtml(item.fromProjectName||cp.name)}</span></div>
          <div class="recycle-meta-chip"><span class="chip-label">原列表：</span><span class="chip-val">${escapeHtml(item.fromListName||'未知')}</span></div>
          <div class="recycle-meta-chip"><span class="chip-label">进度：</span><span class="chip-val">${prog}</span></div>
          <div class="recycle-meta-chip"><span class="chip-label">删除于：</span><span class="chip-val">${delDate}</span></div>
        </div>
        <div class="recycle-item-actions">
          <button class="btn btn-ghost btn-sm" onclick="restoreItem('${item.id}')">恢复卡片</button>
          <button class="btn btn-danger btn-sm" onclick="permanentlyDeleteItem('${item.id}')">彻底删除</button>
        </div>`;
    }
    list.appendChild(el);
  });
  const clearAll=document.createElement('div');
  clearAll.style.cssText='margin-top:16px';
  clearAll.innerHTML=`<button class="btn btn-danger" onclick="emptyRecycleBin()">清空回收站</button>`;
  list.appendChild(clearAll);
}

/* 卡片移入回收站（含项目名+进度） */
function moveCurrentCardToRecycle(){
  if(!currentModalCard)return;
  const cp=currentProject();const {card,list}=currentModalCard;
  cp.recycleBin.push({type:'card',id:card.id,title:card.title,labels:card.labels,desc:card.desc,date:card.date,subtasks:card.subtasks,deletedAt:new Date().toISOString(),fromProjectName:cp.name,fromListName:list.title,progress:cardProgress(card)});
  list.cards=list.cards.filter(c=>c.id!==card.id);
  closeModal();setTimeout(renderAll,300);
}
function restoreItem(id){
  const cp=currentProject();const idx=cp.recycleBin.findIndex(i=>i.id===id);if(idx===-1)return;
  const item=cp.recycleBin[idx];
  if(item.type==='list'){
    const {type,deletedAt,fromProjectName,...cleanList}=item;
    cp.lists.push(cleanList);
  } else {
    let targetList=cp.lists.find(l=>l.title===item.fromListName)||cp.lists[0];
    if(!targetList){alert('没有可恢复的列表');return}
    const {type,deletedAt,fromProjectName,fromListName,progress,...cleanCard}=item;
    targetList.cards.push(cleanCard);
  }
  cp.recycleBin.splice(idx,1);renderAll();
}
function permanentlyDeleteItem(id){
  if(!confirm('彻底删除后无法恢复，确定？'))return;
  const cp=currentProject();cp.recycleBin=cp.recycleBin.filter(i=>i.id!==id);renderAll();
}
function emptyRecycleBin(){
  const cp=currentProject();if(cp.recycleBin.length===0)return;
  if(!confirm(`将彻底删除 ${cp.recycleBin.length} 项，无法恢复，确定？`))return;
  cp.recycleBin=[];renderAll();
}

/* 拖拽 */
let drag=null;const DRAG_THRESHOLD=5;let lastPointerX=0,lastPointerY=0;
function initDrag(){
  document.addEventListener('pointerdown',onPointerDown,{passive:false});
  document.addEventListener('pointermove',onPointerMove,{passive:false});
  document.addEventListener('pointerup',onPointerUp);
  document.addEventListener('pointercancel',onPointerUp);
}
function onPointerDown(e){
  if(e.target.closest('.modal, input, textarea, button, .add-card-form, .add-list-form, .subtask-check, .subtask-del, .label-remove, .label-color-opt, .project-item, .add-project, .recycle-btn, .sidebar-tab'))return;
  if(e.button!==0&&e.pointerType==='mouse')return;
  const cardEl=e.target.closest('.card');const listEl=e.target.closest('.list');
  if(cardEl){
    e.preventDefault();
    drag={type:'card',cardEl,startX:e.clientX,startY:e.clientY,pointerId:e.pointerId,cardId:cardEl.dataset.id,fromListId:cardEl.dataset.listId,moved:false,isClick:true};
  } else if(listEl){
    const header=e.target.closest('.list-header');if(!header)return;
    if(e.target.closest('.list-title, .list-title-input, .list-count, .btn-icon'))return;
    e.preventDefault();
    drag={type:'list',listEl,startX:e.clientX,startY:e.clientY,pointerId:e.pointerId,listId:listEl.dataset.id,moved:false,isClick:false};
  }
}
function onPointerMove(e){
  lastPointerX=e.clientX;lastPointerY=e.clientY;
  if(!drag||e.pointerId!==drag.pointerId)return;
  const dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;
  if(!drag.moved&&Math.hypot(dx,dy)>DRAG_THRESHOLD){drag.moved=true;drag.isClick=false;startActualDrag(e)}
  if(drag.moved&&drag.clone)updateDrag(e);
}
function startActualDrag(e){if(drag.type==='card')startCardDrag(e);else if(drag.type==='list')startListDrag(e)}
function startCardDrag(e){
  const cardEl=drag.cardEl;const rect=cardEl.getBoundingClientRect();
  drag.offsetX=drag.startX-rect.left;drag.offsetY=drag.startY-rect.top;
  const clone=cardEl.cloneNode(true);clone.classList.add('dragging-clone');clone.style.width=rect.width+'px';
  // 关键：cloneNode 会复制原卡片的 transition/transform（FLIP 残留），必须先清除再定位
  // 否则 clone 会从残留位置动画到目标位置，表现为先飞到左上角再回来
  clone.style.transition='none';
  clone.style.left='0px';clone.style.top='0px';
  // 先 appendChild 再设 transform，避免初始 transform 被旧 transition 干扰
  document.body.appendChild(clone);
  // 强制重排，确保 transition:none 生效
  clone.offsetHeight;
  clone.style.transform=`translate3d(${e.clientX-drag.offsetX}px,${e.clientY-drag.offsetY}px,0) rotate(2deg)`;
  cardEl.classList.add('dragging');
  drag.clone=clone;drag.lastTargetKey='';recordFlipPositions();
}
function updateDrag(e){
  // 用 transform 移动 clone，避免 left/top 重排
  drag.clone.style.transform=`translate3d(${e.clientX-drag.offsetX}px,${e.clientY-drag.offsetY}px,0) rotate(2deg)`;
  const target=findDropTarget(e.clientX,e.clientY);
  if(target){
    // 去重：落点没变就不重复操作 DOM，避免跳动
    const key=target.type==='empty'?'empty:'+target.listEl.dataset.id:'card:'+target.targetCard.dataset.id+':'+target.insertBefore;
    if(key!==drag.lastTargetKey){
      drag.lastTargetKey=key;
      moveCardInDOM(target);
    }
  }
  handleAutoScroll(e.clientX,e.clientY);
}
function findDropTarget(x,y){
  // 用 visibility 代替 display:none，避免布局重排抖动
  drag.clone.style.visibility='hidden';
  const elBelow=document.elementFromPoint(x,y);
  drag.clone.style.visibility='';
  if(!elBelow)return null;
  const cardEl=elBelow.closest('.card:not(.dragging)');const listEl=elBelow.closest('.list');
  if(cardEl){const rect=cardEl.getBoundingClientRect();return {type:'card',targetCard:cardEl,insertBefore:y<rect.top+rect.height/2,listEl:cardEl.closest('.list')}}
  if(listEl){const cc=listEl.querySelector('.cards-container');const cards=[...cc.querySelectorAll('.card:not(.dragging)')];if(cards.length===0)return {type:'empty',listEl,cc};let lastBelow=null;for(const c of cards){const r=c.getBoundingClientRect();if(y<r.top+r.height/2)return {type:'card',targetCard:c,insertBefore:true,listEl};lastBelow=c}return {type:'card',targetCard:lastBelow,insertBefore:false,listEl}}
  return null;
}
function moveCardInDOM(target){
  if(target.type==='empty')target.cc.appendChild(drag.cardEl);
  else if(target.type==='card'){const cc=target.listEl.querySelector('.cards-container');if(target.insertBefore)cc.insertBefore(drag.cardEl,target.targetCard);else cc.insertBefore(drag.cardEl,target.targetCard.nextSibling)}
  updateCardDataModel();applyFlipAnimation();updateListCounts();
}
function updateCardDataModel(){
  const newParent=drag.cardEl.closest('.list');const newParentId=newParent.dataset.id;drag.cardEl.dataset.listId=newParentId;
  const oldList=findList(drag.fromListId);const idx=oldList.cards.findIndex(c=>c.id===drag.cardId);if(idx===-1)return;
  const [card]=oldList.cards.splice(idx,1);const newList=findList(newParentId);
  const domCards=[...newParent.querySelectorAll('.card:not(.dragging)')];const newIdx=domCards.indexOf(drag.cardEl);
  newList.cards.splice(newIdx,0,card);
}
function startListDrag(e){
  const listEl=drag.listEl;const rect=listEl.getBoundingClientRect();
  drag.offsetX=drag.startX-rect.left;drag.offsetY=drag.startY-rect.top;
  const placeholder=document.createElement('div');placeholder.className='list dragging-list';placeholder.style.cssText=`flex:0 0 ${rect.width}px;visibility:hidden`;listEl.parentNode.insertBefore(placeholder,listEl);
  const clone=listEl.cloneNode(true);clone.classList.add('dragging-clone');
  clone.style.cssText=`position:fixed;z-index:9999;pointer-events:none;width:${rect.width}px;left:0;top:0;will-change:transform;box-shadow:0 16px 40px rgba(30,58,95,0.2);transition:none;`;
  document.body.appendChild(clone);
  clone.offsetHeight;
  clone.style.transform=`translate3d(${e.clientX-drag.offsetX}px,${e.clientY-drag.offsetY}px,0) rotate(1.5deg)`;
  listEl.style.display='none';drag.clone=clone;drag.placeholder=placeholder;drag.lastListKey='';
}
function updateListDrag(e){
  drag.clone.style.transform=`translate3d(${e.clientX-drag.offsetX}px,${e.clientY-drag.offsetY}px,0) rotate(1.5deg)`;
  drag.clone.style.visibility='hidden';const elBelow=document.elementFromPoint(e.clientX,e.clientY);drag.clone.style.visibility='';if(!elBelow)return;
  const targetList=elBelow.closest('.list:not(.dragging-list)');
  if(targetList&&targetList!==drag.placeholder){
    const rect=targetList.getBoundingClientRect();const insertBefore=e.clientX<rect.left+rect.width/2;
    const key=targetList.dataset.id+':'+insertBefore;
    if(key!==drag.lastListKey){
      drag.lastListKey=key;
      if(insertBefore&&targetList.previousElementSibling!==drag.placeholder){drag.placeholder.parentNode.insertBefore(drag.placeholder,targetList);applyListFlipAnimation()}
      else if(!insertBefore&&targetList.nextElementSibling!==drag.placeholder){drag.placeholder.parentNode.insertBefore(drag.placeholder,targetList.nextSibling);applyListFlipAnimation()}
    }
  }
  handleAutoScroll(e.clientX,e.clientY);
}
function applyListFlipAnimation(){
  const lists=[...document.querySelectorAll('.board > .list:not(.dragging-list)')];
  lists.forEach(l=>{if(!l._flipRect)l._flipRect=l.getBoundingClientRect()});
  requestAnimationFrame(()=>{lists.forEach(l=>{const newRect=l.getBoundingClientRect();const oldRect=l._flipRect;if(!oldRect)return;const dx=oldRect.left-newRect.left;if(dx){l.style.transition='none';l.style.transform=`translateX(${dx}px)`;requestAnimationFrame(()=>{l.style.transition='transform 0.25s cubic-bezier(0.2,0.8,0.2,1)';l.style.transform=''})}l._flipRect=newRect})});
}
let flipRecord=null;
function recordFlipPositions(){
  flipRecord=new Map();
  document.querySelectorAll('.card:not(.dragging):not(.dragging-clone)').forEach(c=>{
    // 清除可能残留的 FLIP 过渡状态，避免记录到中间位置
    c.style.transition='none';
    c.style.transform='';
    flipRecord.set(c,c.getBoundingClientRect());
  });
}
function applyFlipAnimation(){
  if(!flipRecord)return;
  requestAnimationFrame(()=>{document.querySelectorAll('.card:not(.dragging):not(.dragging-clone)').forEach(c=>{const oldRect=flipRecord.get(c);if(!oldRect)return;const newRect=c.getBoundingClientRect();const dx=oldRect.left-newRect.left;const dy=oldRect.top-newRect.top;if(dx||dy){c.style.transition='none';c.style.transform=`translate(${dx}px,${dy}px)`;c.offsetHeight;c.style.transition='transform 0.2s cubic-bezier(0.2,0.8,0.2,1)';c.style.transform=''}});flipRecord=new Map();document.querySelectorAll('.card:not(.dragging):not(.dragging-clone)').forEach(c=>flipRecord.set(c,c.getBoundingClientRect()))});
}
let scrollRAF=null;
function handleAutoScroll(x,y){
  const scroller=document.getElementById('board-scroll');const rect=scroller.getBoundingClientRect();const edgeWidth=80;const maxSpeed=20;
  cancelAnimationFrame(scrollRAF);
  function step(){
    if(!drag||!drag.moved)return;let dx=0;
    if(x-rect.left<edgeWidth)dx=-maxSpeed*(1-(x-rect.left)/edgeWidth);
    else if(rect.right-x<edgeWidth)dx=maxSpeed*(1-(rect.right-x)/edgeWidth);
    if(dx){
      scroller.scrollLeft+=dx;
      if(drag.clone){
        drag.clone.style.visibility='hidden';
        const elBelow=document.elementFromPoint(lastPointerX,lastPointerY);
        drag.clone.style.visibility='';
        if(elBelow){
          if(drag.type==='card'){
            const target=findDropTarget(lastPointerX,lastPointerY);
            if(target){
              const key=target.type==='empty'?'empty:'+target.listEl.dataset.id:'card:'+target.targetCard.dataset.id+':'+target.insertBefore;
              if(key!==drag.lastTargetKey){drag.lastTargetKey=key;moveCardInDOM(target)}
            }
          }else if(drag.type==='list'){
            const targetList=elBelow.closest('.list:not(.dragging-list)');
            if(targetList&&targetList!==drag.placeholder){
              const r=targetList.getBoundingClientRect();const insertBefore=lastPointerX<r.left+r.width/2;
              const key=targetList.dataset.id+':'+insertBefore;
              if(key!==drag.lastListKey){
                drag.lastListKey=key;
                if(insertBefore&&targetList.previousElementSibling!==drag.placeholder){drag.placeholder.parentNode.insertBefore(drag.placeholder,targetList);applyListFlipAnimation()}
                else if(!insertBefore&&targetList.nextElementSibling!==drag.placeholder){drag.placeholder.parentNode.insertBefore(drag.placeholder,targetList.nextSibling);applyListFlipAnimation()}
              }
            }
          }
        }
      }
      scrollRAF=requestAnimationFrame(step);
    }
  }
  if(drag&&drag.moved)step();
}
function onPointerUp(e){
  if(!drag||e.pointerId!==drag.pointerId)return;
  if(!drag.moved){if(drag.type==='card'&&drag.isClick)openCardModal(drag.cardEl)}
  else{
    if(drag.clone)drag.clone.remove();
    if(drag.type==='card'){drag.cardEl.classList.remove('dragging');drag.cardEl.style.transition='';drag.cardEl.style.transform=''}
    else if(drag.type==='list'){const ph=drag.placeholder;ph.parentNode.insertBefore(drag.listEl,ph);drag.listEl.style.display='';ph.remove();const newOrder=[...document.querySelectorAll('.board > .list:not(.dragging-list)')].map(l=>l.dataset.id);const cp=currentProject();cp.lists.sort((a,b)=>newOrder.indexOf(a.id)-newOrder.indexOf(b.id))}
    cancelAnimationFrame(scrollRAF);flipRecord=null;document.querySelectorAll('.card:not(.dragging-clone)').forEach(c=>{c.style.transition='';c.style.transform='';c._flipRect=null});
  }
  drag=null;
}

/* 弹窗 */
let currentModalCard=null;let modalOpenRect=null;
function openCardModal(cardEl){
  const data=findCard(cardEl.dataset.id);if(!data)return;currentModalCard={cardEl,...data};
  const rect=cardEl.getBoundingClientRect();modalOpenRect=rect;
  const modal=document.getElementById('modal');const backdrop=document.getElementById('modal-backdrop');
  document.getElementById('modal-title').value=data.card.title;
  document.getElementById('modal-desc').value=data.card.desc||'';
  document.getElementById('modal-date').value=data.card.date||'';
  document.getElementById('modal-start-date').value=data.card.startDate||'';
  document.getElementById('modal-list-name').textContent=data.list.title;
  renderLabelsEditor(data.card);renderLabelPalette(data.card);renderSubtasks(data.card);
  const targetW=Math.min(680,window.innerWidth*0.92);const targetH=Math.min(window.innerHeight*0.88,620);
  const targetX=(window.innerWidth-targetW)/2;const targetY=(window.innerHeight-targetH)/2;
  modal.style.width=targetW+'px';modal.style.left=rect.left+'px';modal.style.top=rect.top+'px';
  modal.style.transform=`scale(${rect.width/targetW},${rect.height/targetH})`;modal.style.transformOrigin='0 0';modal.style.opacity='0';
  backdrop.classList.add('active');modal.classList.add('active');modal.style.display='flex';
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{modal.style.transition='transform 0.32s cubic-bezier(0.2,0.8,0.2,1),opacity 0.25s ease,left 0.32s cubic-bezier(0.2,0.8,0.2,1),top 0.32s cubic-bezier(0.2,0.8,0.2,1)';modal.style.left=targetX+'px';modal.style.top=targetY+'px';modal.style.transform='scale(1,1)';modal.style.opacity='1';modal._finalRect=modal.getBoundingClientRect()})});
  const titleInput=document.getElementById('modal-title');
  titleInput.oninput=()=>{data.card.title=titleInput.value;cardEl.querySelector('.card-title').textContent=titleInput.value};
  const descInput=document.getElementById('modal-desc');
  descInput.oninput=()=>{data.card.desc=descInput.value;updateCardMeta(cardEl,data.card)};
  const dateInput=document.getElementById('modal-date');
  dateInput.onchange=()=>{data.card.date=dateInput.value;updateCardMeta(cardEl,data.card)};
  const startDateInput=document.getElementById('modal-start-date');
  startDateInput.onchange=()=>{data.card.startDate=startDateInput.value;updateCardMeta(cardEl,data.card)};
  backdrop.onclick=()=>closeModal();
}
function updateCardMeta(cardEl,card){cardEl.innerHTML=getCardInnerHtml(card)}
function closeModal(){
  const modal=document.getElementById('modal');const backdrop=document.getElementById('modal-backdrop');
  if(!modal.classList.contains('active'))return;
  modal.classList.add('closing');backdrop.style.opacity='0';
  if(modalOpenRect&&currentModalCard){
    const finalW=modal._finalRect?modal._finalRect.width:parseFloat(modal.style.width);
    const finalH=modal._finalRect?modal._finalRect.height:200;
    modal.style.transition='transform 0.28s cubic-bezier(0.2,0.8,0.2,1),opacity 0.2s ease,left 0.28s cubic-bezier(0.2,0.8,0.2,1),top 0.28s cubic-bezier(0.2,0.8,0.2,1)';
    modal.style.left=modalOpenRect.left+'px';modal.style.top=modalOpenRect.top+'px';
    modal.style.transform=`scale(${modalOpenRect.width/finalW},${modalOpenRect.height/finalH})`;modal.style.opacity='0';
  }
  setTimeout(()=>{modal.classList.remove('active','closing');backdrop.classList.remove('active');backdrop.style.opacity='';modal.style.display='none';modal.style.transition='';currentModalCard=null;modalOpenRect=null},300);
}
function renderLabelsEditor(card){
  const editor=document.getElementById('labels-editor');editor.innerHTML='';
  if(card.labels&&card.labels.length){card.labels.forEach((l,i)=>{const chip=document.createElement('div');chip.className='label-chip';chip.style.background=l.c;chip.innerHTML=`${escapeHtml(l.n||'')} <span class="label-remove" onclick="removeLabel(${i})">×</span>`;editor.appendChild(chip)})}
  const addBtn=document.createElement('button');addBtn.className='label-add-btn';addBtn.textContent='+ 添加标签';
  addBtn.onclick=()=>{document.getElementById('label-palette').style.display=document.getElementById('label-palette').style.display==='grid'?'none':'grid'};
  editor.appendChild(addBtn);
}
function renderLabelPalette(card){
  const p=document.getElementById('label-palette');p.innerHTML='';
  LABEL_COLORS.forEach(lc=>{const opt=document.createElement('div');opt.className='label-color-opt';opt.style.background=lc.value;opt.textContent=lc.name;opt.onclick=()=>{if(!card.labels)card.labels=[];if(card.labels.find(l=>l.c===lc.value))card.labels=card.labels.filter(l=>l.c!==lc.value);else card.labels.push({c:lc.value,n:lc.name});renderLabelsEditor(card);renderLabelPalette(card);if(currentModalCard)updateCardMeta(currentModalCard.cardEl,card)};p.appendChild(opt)});
}
function removeLabel(idx){if(!currentModalCard)return;currentModalCard.card.labels.splice(idx,1);renderLabelsEditor(currentModalCard.card);renderLabelPalette(currentModalCard.card);updateCardMeta(currentModalCard.cardEl,currentModalCard.card)}
function renderSubtasks(card){
  const container=document.getElementById('subtasks');container.innerHTML='';
  if(!card.subtasks)card.subtasks=[];
  card.subtasks.forEach(s=>{const item=document.createElement('div');item.className='subtask-item';item.innerHTML=`<div class="subtask-check ${s.done?'done':''}" onclick="toggleSubtask('${s.id}')"></div><input class="subtask-text ${s.done?'done':''}" value="${escapeHtml(s.text)}" onchange="updateSubtaskText('${s.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()"><button class="subtask-del" onclick="deleteSubtask('${s.id}')">×</button>`;container.appendChild(item)});
  const add=document.createElement('div');add.className='subtask-add';add.innerHTML=`<button class="subtask-add-btn">+</button><input class="subtask-add-input" placeholder="添加子任务…" onkeydown="if(event.key==='Enter'){addSubtask(this.value);this.value=''}">`;
  add.querySelector('.subtask-add-btn').onclick=()=>{const i=add.querySelector('.subtask-add-input');addSubtask(i.value);i.value=''};
  container.appendChild(add);
}
function addSubtask(text){if(!text.trim()||!currentModalCard)return;currentModalCard.card.subtasks.push({id:L(),text:text.trim(),done:false});renderSubtasks(currentModalCard.card);updateCardMeta(currentModalCard.cardEl,currentModalCard.card)}
function toggleSubtask(id){if(!currentModalCard)return;const s=currentModalCard.card.subtasks.find(s=>s.id===id);if(s){s.done=!s.done;renderSubtasks(currentModalCard.card);updateCardMeta(currentModalCard.cardEl,currentModalCard.card)}}
function updateSubtaskText(id,text){if(!currentModalCard)return;const s=currentModalCard.card.subtasks.find(s=>s.id===id);if(s)s.text=text}
function deleteSubtask(id){if(!currentModalCard)return;currentModalCard.card.subtasks=currentModalCard.card.subtasks.filter(s=>s.id!==id);renderSubtasks(currentModalCard.card);updateCardMeta(currentModalCard.cardEl,currentModalCard.card)}
function updateListCounts(){document.querySelectorAll('.list').forEach(l=>{const c=l.querySelectorAll('.card').length;const el=l.querySelector('.list-count');if(el)el.textContent=c})}
function exportData(){const blob=new Blob([exportState()],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`flow-board-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url)}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{importState(reader.result)};reader.readAsText(file);e.target.value=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('modal').classList.contains('active'))closeModal();if(document.getElementById('add-card-modal').classList.contains('active'))closeAddCardModal()}});
// 暴露到 window 供调试
Object.assign(window,{renderAll,openCardModal,closeModal,moveCurrentCardToRecycle,toggleRecycleView,switchProject,toggleArchiveProject,addSubtask,toggleSubtask,openAddCardModal,closeAddCardModal,confirmAddCard,renderAddCardLabelsEditor,renderAddCardLabelPalette,renderAddCardSubtasks,addAddCardSubtask,getCurrentState:()=>state,saveState,loadState,exportState,importState,clearAllData});
renderAll();initDrag();
</script>
